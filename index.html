<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUSH X BELVEDERE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text x=%228%22 y=%2213%22 font-size=%2213%22 text-anchor=%22middle%22>%F0%9F%8C%B8</text></svg>">
<style>
  :root{
    --pink: #E3B1BC;
    --pink-deep: #c98ea0;
    --pink-soft: #f6e3e7;
    --ink: #211c1e;
    --ink-soft: #4a4145;
    --paper: #fffaf9;
    --shadow: 4px 4px 0 var(--ink);
    --ok: #7cae7a;
    --err: #d3697a;
    --warn: #e0a95c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    position:relative;
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    font-size:14px;
    line-height:1.6;
    min-height:100vh;
  }
  #bgBase{
    position:fixed; inset:0; z-index:-2;
    background:
      repeating-linear-gradient(0deg, rgba(33,28,30,0.035) 0px, rgba(33,28,30,0.035) 1px, transparent 1px, transparent 3px),
      var(--pink-soft);
  }
  #bgLayer{
    position:fixed; inset:-20px; z-index:-1;
    background-size:cover; background-position:center;
    filter:blur(0px); opacity:0; transition:opacity .3s;
    pointer-events:none;
  }
  .pixel{font-family:'Press Start 2P', monospace; letter-spacing:0.5px;}
  a{color:var(--ink); text-decoration:none;}
  ::selection{background:var(--pink); color:var(--ink);}
  button{font-family:'Noto Sans KR', sans-serif; cursor:pointer;}
  ::-webkit-scrollbar{width:14px; height:14px;}
  ::-webkit-scrollbar-track{background:var(--pink-soft); border-left:2px solid var(--ink);}
  ::-webkit-scrollbar-thumb{background:var(--pink); border:2px solid var(--ink);}

  /* ---------- content protection (non-admin): block right-click / long-press save ---------- */
  body:not(.admin-mode){
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
  }
  body:not(.admin-mode) input,
  body:not(.admin-mode) textarea{
    -webkit-user-select:text; -moz-user-select:text; user-select:text;
  }
  body:not(.admin-mode) img{
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-user-drag:none;
    user-drag:none;
    pointer-events:auto;
  }

  /* ---------- fixed-size scroll boxes (LOG / GALLERY / MEMO): hidden scrollbar ---------- */
  .panel-scroll{
    height:440px;
    overflow-y:auto;
    overflow-x:hidden;
    scrollbar-width:none;      /* firefox */
    -ms-overflow-style:none;   /* IE/Edge */
  }
  .panel-scroll::-webkit-scrollbar{width:0; height:0; display:none;} /* chrome/safari */

  /* ---------- admin-only visibility ---------- */
  .admin-only{display:none !important;}
  body.admin-mode .admin-only{display:flex !important;}
  body.admin-mode .admin-only.inline{display:inline-flex !important;}
  body.admin-mode .admin-only.block{display:block !important;}

  /* ---------- top bar ---------- */
  .topbar{
    background:var(--ink); color:var(--pink-soft);
    font-size:11px; padding:6px 16px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:3px solid var(--pink);
    position:relative; z-index:5;
  }
  .topbar span{opacity:.85;}
  .blink{animation:blink 1.2s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}
  .admin-flag{background:var(--pink); color:var(--ink); padding:1px 6px; font-size:10px; margin-left:8px;}

  .wrap{max-width:1180px; margin:0 auto; padding:18px 14px 60px; position:relative;}

  /* ---------- hero ---------- */
  .hero{
    background:var(--paper);
    border:3px solid var(--ink);
    box-shadow:var(--shadow);
    padding:22px 24px;
    margin-bottom:14px;
    position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .hero::before{
    content:""; position:absolute; inset:0;
    background-image:radial-gradient(circle, var(--pink) 1.5px, transparent 1.5px);
    background-size:16px 16px; opacity:.35; pointer-events:none;
  }
  .hero-title{position:relative; z-index:1; max-width:560px;}
  .hero-title h1{margin:0 0 8px; font-size:24px; text-shadow:3px 3px 0 var(--pink); letter-spacing:1px;}
  .hero-title p{margin:0; font-size:12px; color:var(--ink-soft); white-space:pre-line;}
  .hero-right{position:relative; z-index:1; display:flex; flex-direction:column; gap:8px; align-items:flex-end;}
  .status-chip{background:var(--pink); border:2px solid var(--ink); font-size:10px; padding:6px 10px; box-shadow:2px 2px 0 var(--ink);}
  .dday-chip{background:var(--ink); color:var(--pink-soft); border:2px solid var(--ink); font-size:11px; padding:6px 10px; box-shadow:2px 2px 0 var(--pink-deep);}

  /* ---------- marquee ---------- */
  .marquee-wrap{
    border:3px solid var(--ink); box-shadow:var(--shadow); background:var(--ink); color:var(--pink-soft);
    padding:8px 0; margin-bottom:14px; overflow:hidden; white-space:nowrap;
  }
  .marquee{display:inline-block; padding-left:100%; font-size:11px; animation:scroll 18s linear infinite;}
  @keyframes scroll{ to{ transform:translateX(-100%);} }

  /* ---------- nav tabs ---------- */
  .nav{
    display:flex; flex-wrap:wrap; gap:0; border:3px solid var(--ink); box-shadow:var(--shadow);
    margin-bottom:16px; background:var(--ink);
  }
  .nav button{
    flex:1; text-align:center; padding:12px 6px; background:var(--paper); color:var(--ink);
    font-size:11px; border:none; border-right:2px solid var(--ink); white-space:nowrap; position:relative;
  }
  .nav button:last-child{border-right:none;}
  .nav button:hover{background:var(--pink);}
  .nav button.active{background:var(--pink); font-weight:bold;}
  .nav button[contenteditable="true"]{outline:2px dashed var(--ink); background:#fff;}

  /* ---------- grid ---------- */
  .grid{display:grid; grid-template-columns:225px 1fr 225px; gap:16px; align-items:start;}
  @media (max-width:920px){.grid{grid-template-columns:1fr;}}

  /* ---------- panel/box ---------- */
  .box{background:var(--paper); border:3px solid var(--ink); box-shadow:var(--shadow); margin-bottom:16px;}
  .box-head{background:var(--pink); border-bottom:3px solid var(--ink); padding:8px 10px; font-size:11px; display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .box-head-left{display:flex; align-items:center; gap:6px;}
  .box-head-left::before{content:"♥";}
  .box-body{padding:14px;}
  .mini-btn{
    border:2px solid var(--ink); background:var(--paper); font-size:10px; padding:4px 7px;
    box-shadow:2px 2px 0 var(--ink);
  }
  .mini-btn:hover{background:var(--ink); color:var(--pink);}
  .mini-btn.danger:hover{background:var(--err); color:#fff;}

  /* ---------- profile ---------- */
  .avatar{width:100%; aspect-ratio:1/1; background:linear-gradient(135deg, var(--pink) 25%, var(--pink-soft) 25%, var(--pink-soft) 50%, var(--pink) 50%, var(--pink) 75%, var(--pink-soft) 75%); background-size:14px 14px; border:2px solid var(--ink); margin-bottom:10px; display:flex; align-items:center; justify-content:center; font-size:38px; position:relative; overflow:hidden;}

  /* ---------- cover image editor (avatar / now playing) ---------- */
  .cover-edit{user-select:none;}
  body.admin-mode .cover-edit{cursor:grab;}
  body.admin-mode .cover-edit:active{cursor:grabbing;}
  .cover-placeholder{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  .cover-img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; pointer-events:none; transform-origin:center;}
  .cover-hint{
    position:absolute; left:0; right:0; bottom:0; background:rgba(33,28,30,.72); color:#fff;
    font-size:8.5px; text-align:center; padding:4px 3px; line-height:1.4; opacity:0; transition:opacity .15s; pointer-events:none;
  }
  body.admin-mode .cover-edit:hover .cover-hint{opacity:1;}
  .btn.danger{border-color:var(--ink);}
  .btn.danger:hover{background:var(--err); color:#fff;}
  .profile-name{font-size:13px; text-align:center; margin:0 0 4px;}
  .profile-sub{font-size:10px; text-align:center; color:var(--ink-soft); margin:0 0 10px;}
  .stat-row{display:flex; justify-content:space-between; font-size:11px; border-top:1px dashed var(--ink); padding:6px 0;}

  /* ---------- HOME tab ---------- */
  .home-cover{
    width:100%; height:200px; border:2px solid var(--ink); position:relative; overflow:hidden;
    background:repeating-linear-gradient(45deg, var(--pink), var(--pink) 8px, var(--pink-soft) 8px, var(--pink-soft) 16px);
    margin-bottom:14px; display:flex; align-items:center; justify-content:center; font-size:34px;
  }
  .home-text{padding:2px 2px 4px;}
  .home-title{margin:0 0 8px; font-size:16px; text-shadow:2px 2px 0 var(--pink);}
  .home-subtitle{margin:0; font-size:12px; color:var(--ink-soft); white-space:pre-line;}
  [contenteditable="true"].home-title, [contenteditable="true"].home-subtitle{
    outline:2px dashed var(--pink-deep); outline-offset:3px; background:#fff;
  }
  .edit-hint{font-size:9px; color:var(--pink-deep); margin-top:6px;}

  /* ---------- entries: LOG ---------- */
  .entry{border-bottom:2px dashed var(--pink-deep); padding:12px 0; position:relative;}
  .entry:last-child{border-bottom:none;}
  .entry-top{display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap;}
  .entry-title{font-size:13px; font-weight:700; margin:0;}
  .entry-date{font-size:10px; color:var(--ink-soft); flex-shrink:0;}
  .entry-body{font-size:12px; color:var(--ink-soft); margin-top:6px; white-space:pre-line;}
  .entry-actions{display:flex; gap:6px; margin-top:8px;}
  .add-row{display:flex; justify-content:flex-end; margin-bottom:10px;}

  /* ---------- memo board ---------- */
  .memo-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px;}
  .memo-card{border:2px solid var(--ink); padding:10px; font-size:12px; position:relative; min-height:90px; box-shadow:3px 3px 0 var(--ink); display:flex; flex-direction:column;}
  .memo-card.pink{background:var(--pink);}
  .memo-card.paper{background:#fff;}
  .memo-card.mint{background:#cfe8dd;}
  .memo-card.lav{background:#e2d7ee;}
  .memo-card.peach{background:#f6d3ab;}
  .memo-text{flex:1;}
  .memo-date{font-size:9px; color:var(--ink-soft); margin-top:8px; padding-top:6px; border-top:1px dashed rgba(33,28,30,.3);}
  .memo-actions{position:absolute; top:6px; right:6px; display:flex; gap:4px;}

  /* ---------- gallery ---------- */
  .gallery-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
  @media (max-width:600px){.gallery-grid{grid-template-columns:repeat(2,1fr);}}
  .gallery-item{aspect-ratio:1/1; border:2px solid var(--ink); position:relative; overflow:hidden; background:var(--pink-soft); display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .gallery-item img{width:100%; height:100%; object-fit:cover;}
  .gallery-item .placeholder{font-size:22px;}
  .gallery-cap{position:absolute; left:0; right:0; bottom:0; background:rgba(33,28,30,.75); color:#fff; font-size:9px; padding:3px 5px;}
  .gallery-actions{position:absolute; top:4px; right:4px; display:flex; gap:4px;}

  /* ---------- PROFILE tab: two character cards ---------- */
  .profile-cards-wrap{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start;}
  @media (max-width:640px){.profile-cards-wrap{grid-template-columns:1fr;}}
  .profile-card{border:2px solid var(--ink); box-shadow:3px 3px 0 var(--ink); background:var(--paper);}
  .profile-card-head{
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:2px solid var(--ink); padding:9px 10px; font-size:10.5px;
  }
  .profile-card-head.pink{background:var(--pink);}
  .profile-card-head.paper{background:#fff;}
  .profile-card-head.mint{background:#cfe8dd;}
  .profile-card-head.lav{background:#e2d7ee;}
  .profile-card-head.peach{background:#f6d3ab;}
  .color-swatch-btn{width:20px; height:20px; border:2px solid var(--ink); cursor:pointer; padding:0; overflow:hidden; position:relative; display:inline-block;}
  .color-swatch-btn input[type="color"]{
    position:absolute; inset:-4px; width:calc(100% + 8px); height:calc(100% + 8px);
    border:none; padding:0; cursor:pointer; opacity:0;
  }
  .profile-card-body{padding:12px;}

  .section-block{border-bottom:2px dashed var(--pink-deep); padding:12px 0;}
  .section-block:first-child{padding-top:0;}
  .section-block:last-child{border-bottom:none; padding-bottom:0;}
  .section-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .section-label{font-size:9.5px; letter-spacing:.5px; color:var(--pink-deep); font-weight:700;}
  .section-reorder{display:flex; gap:4px;}
  .section-reorder .mini-btn{padding:2px 6px; font-size:9px;}

  .profile-photo-box{
    width:100%; aspect-ratio:1/1; border:2px solid var(--ink); position:relative; overflow:hidden;
    background:repeating-linear-gradient(45deg, var(--pink-soft), var(--pink-soft) 8px, #fff 8px, #fff 16px);
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .quote-block{font-size:12px; font-style:italic; color:var(--ink-soft); border-left:3px solid var(--pink); padding:4px 0 4px 10px; white-space:pre-line;}
  .text-block{font-size:12px; color:var(--ink-soft); white-space:pre-line; min-height:1.4em;}

  .info-table{--label-w:76px; display:flex; flex-direction:column; gap:4px;}
  .info-row{display:grid; grid-template-columns:var(--label-w) 8px 1fr auto; align-items:center; gap:0;}
  .info-label{font-size:11px; font-weight:700; padding:5px 6px; background:var(--pink-soft); overflow:hidden;}
  .info-value{font-size:11px; padding:5px 6px; background:#fff; overflow-wrap:anywhere;}
  .info-label[contenteditable="true"], .info-value[contenteditable="true"]{outline:1px dashed var(--pink-deep); outline-offset:-1px;}
  .info-resizer-handle{width:8px; height:100%; min-height:24px; cursor:col-resize; background:var(--ink); opacity:.15;}
  .info-resizer-handle:hover{opacity:.6;}
  .info-row-del{margin-left:4px;}

  .tags-wrap{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .tag-chip{border:1.5px solid var(--ink); background:var(--pink-soft); font-size:10.5px; padding:4px 8px; display:inline-flex; align-items:center; gap:5px;}
  .tag-remove{border:none; background:none; cursor:pointer; font-size:9px; color:var(--ink-soft); padding:0;}
  .tag-remove:hover{color:var(--err);}
  .tag-add-row{display:flex; gap:6px;}
  .tag-add-input{flex:1; border:2px solid var(--ink); padding:6px 8px; font-size:11px; font-family:'Noto Sans KR', sans-serif; background:#fff;}

  /* ---------- gallery lightbox ---------- */
  .lightbox-body{text-align:center;}
  .lightbox-img{max-width:100%; max-height:70vh; border:2px solid var(--ink);}
  .lightbox-caption{margin-top:10px; font-size:12px; color:var(--ink-soft);}

  .now-playing{display:flex; gap:10px; align-items:center;}
  .np-cover{width:52px; height:52px; border:2px solid var(--ink); background:repeating-conic-gradient(var(--pink) 0% 25%, var(--pink-soft) 0% 50%); background-size:10px 10px; flex-shrink:0; position:relative; overflow:hidden; font-size:20px;}
  .np-text{font-size:11px;}
  .np-bar{height:6px; background:var(--pink-soft); border:1px solid var(--ink); margin-top:6px; overflow:hidden;}
  .np-bar span{display:block; height:100%; width:42%; background:var(--pink-deep);}
  .np-youtube-link{display:inline-block; margin-top:9px; font-size:10px; border:2px solid var(--ink); padding:5px 9px; background:var(--pink-soft); box-shadow:2px 2px 0 var(--ink);}
  .np-youtube-link:hover{background:var(--pink);}

  table.cal{width:100%; border-collapse:collapse; font-size:10px; text-align:center;}
  table.cal th{padding:4px 0; color:var(--pink-deep);}
  table.cal td{padding:5px 0; border:1px solid transparent;}
  table.cal td.today{background:var(--pink); border:1px solid var(--ink); font-weight:bold;}

  footer{text-align:center; font-size:10px; color:var(--ink-soft); padding:26px 10px 10px;}
  footer .pixel{font-size:9px; display:block; margin-bottom:6px; color:var(--ink);}

  .section-title{font-size:12px; margin:0; display:flex; align-items:center; gap:6px;}
  .section-title::before{content:"◆"; color:var(--pink-deep); font-size:10px;}

  /* ---------- floating admin buttons ---------- */
  .admin-fab{position:fixed; right:16px; bottom:16px; display:flex; flex-direction:column; gap:8px; z-index:40;}
  .fab-btn{
    width:46px; height:46px; border:3px solid var(--ink); background:var(--paper);
    box-shadow:3px 3px 0 var(--ink); font-size:18px; display:flex; align-items:center; justify-content:center;
  }
  .fab-btn:hover{background:var(--pink);}
  .fab-btn.on{background:var(--ink); color:var(--pink);}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(33,28,30,.55); display:none;
    align-items:center; justify-content:center; z-index:100; padding:16px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--paper); border:3px solid var(--ink); box-shadow:6px 6px 0 var(--ink);
    width:100%; max-width:460px; max-height:88vh; overflow-y:auto;
  }
  .modal-box.wide{max-width:640px;}
  .modal-head{background:var(--pink); border-bottom:3px solid var(--ink); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; font-size:12px;}
  .modal-close{border:2px solid var(--ink); background:var(--paper); width:24px; height:24px; font-size:12px; line-height:1;}
  .modal-close:hover{background:var(--ink); color:var(--pink);}
  .modal-body{padding:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11px; margin-bottom:5px; color:var(--ink-soft);}
  .field input[type=text], .field input[type=password], .field input[type=date], .field input[type=number], .field input[type=url], .field textarea, .field select{
    width:100%; border:2px solid var(--ink); padding:8px; font-size:12px; font-family:'Noto Sans KR', sans-serif; background:#fff;
  }
  .field textarea{resize:vertical; min-height:80px;}
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}
  .field small{display:block; margin-top:4px; color:var(--ink-soft); font-size:10px;}
  .color-picks{display:flex; gap:8px;}
  .color-pick{width:28px; height:28px; border:2px solid var(--ink); cursor:pointer;}
  .color-pick.pink{background:var(--pink);}
  .color-pick.paper{background:#fff;}
  .color-pick.mint{background:#cfe8dd;}
  .color-pick.lav{background:#e2d7ee;}
  .color-pick.peach{background:#f6d3ab;}
  .color-pick.selected{outline:2px solid var(--ink); outline-offset:2px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:6px;}
  .btn{border:2px solid var(--ink); background:var(--paper); padding:8px 14px; font-size:11px; box-shadow:2px 2px 0 var(--ink);}
  .btn:hover{background:var(--pink);}
  .btn.primary{background:var(--ink); color:var(--pink-soft);}
  .btn.primary:hover{background:var(--pink-deep); color:var(--ink);}
  .divider{border:none; border-top:2px dashed var(--pink-deep); margin:16px 0;}
  .sub-head{font-size:11px; color:var(--pink-deep); margin:0 0 10px; display:flex; align-items:center; gap:6px;}
  .sub-head::before{content:"▸";}
  .gist-actions{display:flex; gap:8px; flex-wrap:wrap;}

  /* ---------- LOG board ---------- */
  .log-toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;}
  .log-search{flex:1; min-width:160px; border:2px solid var(--ink); padding:8px 10px; font-size:12px; font-family:'Noto Sans KR', sans-serif; background:#fff;}
  .log-toolbar-actions{display:flex; gap:6px;}
  .log-cat-tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
  .log-cat-tab{border:2px solid var(--ink); background:var(--paper); font-size:10px; padding:6px 11px; box-shadow:2px 2px 0 var(--ink);}
  .log-cat-tab:hover{background:var(--pink-soft);}
  .log-cat-tab.active{background:var(--ink); color:var(--pink-soft);}
  .log-row{border-bottom:2px dashed var(--pink-deep); padding:11px 2px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; flex-wrap:wrap;}
  .log-row:hover{background:var(--pink-soft);}
  .log-row:last-child{border-bottom:none;}
  .log-row-main{display:flex; align-items:center; gap:8px; flex-wrap:wrap; flex:1; min-width:0;}
  .log-row-title{font-size:12.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:280px;}
  .log-row-side{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .log-badge{font-size:9px; border:1.5px solid var(--ink); padding:2px 7px; background:var(--pink-soft); flex-shrink:0; white-space:nowrap;}
  .log-badge.cat{background:#fff;}
  .log-lock{font-size:11px;}
  .log-comment-count{font-size:10px; color:var(--ink-soft);}

  /* ---------- rich text editor ---------- */
  .editor-toolbar{display:flex; gap:6px; align-items:center; border:2px solid var(--ink); border-bottom:none; padding:6px; background:var(--pink-soft); flex-wrap:wrap;}

  .editor-surface{border:2px solid var(--ink); border-top:none;}

  .img-url-row{display:flex; gap:6px; margin-bottom:6px;}
  .img-url-row input{flex:1;}

  /* ---------- post detail / comments ---------- */
  .post-detail-badges{display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px;}

  .comment-secret-label{display:flex; align-items:center; gap:6px; font-size:11px; margin:2px 0;}
  .comment-form{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
  .comment-form input, .comment-form textarea{border:2px solid var(--ink); padding:8px; font-size:12px; font-family:'Noto Sans KR', sans-serif; background:#fff;}
  .comment-form textarea{min-height:64px; resize:vertical;}
  .comment-item{border-bottom:1px dashed var(--pink-deep); padding:9px 0; font-size:11.5px;}
  .comment-item:last-child{border-bottom:none;}
  .comment-top{display:flex; align-items:center; gap:8px;}
  .comment-top .mini-btn{margin-left:auto;}
  .comment-text{margin-top:4px; color:var(--ink-soft); white-space:pre-line;}

  /* ---------- toast ---------- */
  #toastContainer{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); display:flex; flex-direction:column; gap:8px; z-index:200; align-items:center;}
  .toast{
    border:2px solid var(--ink); background:var(--paper); padding:9px 16px; font-size:11px;
    box-shadow:3px 3px 0 var(--ink); display:flex; align-items:center; gap:8px; animation:toast-in .15s ease-out;
    white-space:nowrap;
  }
  .toast.success{background:var(--ok); color:#fff;}
  .toast.error{background:var(--err); color:#fff;}
  .toast.warn{background:var(--warn); color:var(--ink);}
  @keyframes toast-in{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .empty-msg{font-size:11px; color:var(--ink-soft); text-align:center; padding:20px 0;}
</style>

<script>
(function(){
  'use strict';

  /* =========================================================
     설정 상수 — GitHub Pages에 배포하기 전, 대표(공개) Gist를
     하나 만들어서 그 ID를 아래에 입력해두면, 모든 방문자가
     접속할 때 자동으로 그 Gist의 최신 데이터를 불러옵니다.
     (관리자가 설정 모달에서 입력해도 "내 브라우저"에만 저장되므로,
     다른 사람에게도 적용하려면 결국 이 상수 값을 직접 수정 후
     다시 배포해야 합니다.)
  ========================================================= */
  const CONFIG = { PUBLIC_GIST_ID: "" };
  const GIST_FILENAME = "pairroom-data.json";

  const STORAGE_KEY = "pairroom_data_v1";
  const ADMIN_SESSION_KEY = "pairroom_admin_session";
  const GIST_TOKEN_KEY = "pairroom_gist_token";

  const uid = () => "id_" + Math.random().toString(36).slice(2, 10);

  const PROFILE_TEXT_SECTIONS = [
    { key: "appearance", label: "외모" },
    { key: "personality", label: "성격" },
    { key: "ability", label: "능력" },
    { key: "backstory", label: "서사" }
  ];
  const PROFILE_TAG_SECTIONS = [
    { key: "likes", label: "좋아하는 것" },
    { key: "dislikes", label: "싫어하는 것" }
  ];
  const CARD_COLORS = ["pink", "paper", "mint", "lav", "peach"];
  const CARD_COLOR_MAP = { pink:"#E3B1BC", paper:"#ffffff", mint:"#cfe8dd", lav:"#e2d7ee", peach:"#f6d3ab" };
  function resolveCardColor(c){ return CARD_COLOR_MAP[c] || c || "#ffffff"; }

  function defaultProfileCard(id, color){
    const sections = [
      { type: "photo", key: "photo", data: { url: "", zoom: 1, posX: 50, posY: 50 } },
      { type: "quote", key: "quote", data: { text: "이곳에 명대사를 적어보세요." } },
      { type: "info", key: "info", data: {
          rows: [
            { label: "이름", value: "" }, { label: "나이", value: "" }, { label: "성별", value: "" },
            { label: "소속", value: "" }, { label: "직책", value: "" }, { label: "키", value: "" }
          ], labelWidth: 76
        } }
    ];
    PROFILE_TEXT_SECTIONS.forEach(t => sections.push({ type: "text", key: t.key, label: t.label, data: { text: "" } }));
    PROFILE_TAG_SECTIONS.forEach(t => sections.push({ type: "tags", key: t.key, label: t.label, data: { tags: [] } }));
    return { id: id, color: color, sections: sections };
  }

  /* ---------------- default data ---------------- */
  function defaultState(){
    return {
      meta: {
        title: "PAIR'S ROOM",
        description: "어서오세요! 이곳은 저의 개인 기록 & 백업용 홈페이지예요 >.<\n사진, 일기, 링크들을 소소하게 모아두는 공간입니다.",
        ddayDate: "2024-01-01",
        ddayLabel: "함께한 지",
        bgImageUrl: "",
        bgBlur: 6,
        adminPassword: "0000",
        tabNames: { home: "HOME", log: "LOG", memo: "MEMO", profile: "PROFILE", gallery: "GALLERY" },
        publicGistId: CONFIG.PUBLIC_GIST_ID || ""
      },
      profile: {
        name: "PAIR", sub: "기록하는 걸 좋아하는 사람", avatar: "🐰",
        level: "07", mood: "☺ good", since: "2024.01",
        bio: "안녕하세요! 이 공간은 제 개인적인 기록과 사진들을 백업하는 곳이에요.\n천천히 놀러오세요 :)",
        avatarImage: { url: "", zoom: 1, posX: 50, posY: 50 }
      },
      home: {
        title: "Welcome to PAIR's ROOM ♡",
        subtitle: "이곳은 저의 개인적인 기록과 사진들을 백업하는 공간이에요.\n천천히 둘러보고 가세요 :)",
        cover: { url: "", zoom: 1, posX: 50, posY: 50 }
      },
      nowPlaying: {
        title: "Pixel Lullaby", artist: "Retro Wave Cats", youtubeUrl: "",
        cover: { url: "", zoom: 1, posX: 50, posY: 50 }
      },
      logCategories: [
        { id: "general", name: "일반" },
        { id: "daily", name: "일상" },
        { id: "photo", name: "사진" }
      ],
      log: [
        {
          id: uid(), type: "LOG", category: "general",
          title: "사이트 오픈! 방명록 남겨주세요", date: "2026-07-12",
          bodyHtml: "<p>기존에 흩어져 있던 기록들을 한곳에 백업하려고 픽셀 감성 홈페이지를 제작했습니다. 앞으로 이곳에 기록을 차곡차곡 쌓아둘 예정이에요.</p>",
          images: [], secret: false, password: "", comments: []
        }
      ],
      memo: [
        { id: uid(), text: "오늘의 할 일: 사진 정리하기", color: "pink", date: "2026-07-12" },
        { id: uid(), text: "장보기 리스트 작성하기", color: "mint", date: "2026-07-12" }
      ],
      gallery: [
        { id: uid(), url: "", caption: "봄" },
        { id: uid(), url: "", caption: "산책" }
      ],
      profileCards: {
        left: defaultProfileCard("left", "pink"),
        right: defaultProfileCard("right", "mint")
      }
    };
  }

  const POST_TYPES = [
    { id: "LOG", label: "LOG" },
    { id: "PHOTO", label: "PHOTO GALLERY" },
    { id: "DAILY", label: "DAILY" },
    { id: "MEMO", label: "MEMO" }
  ];
  let logFilterCat = "all";
  let logSearchTerm = "";
  let logSourceMode = false;
  const unlockedSecrets = new Set();

  let state = loadLocal() || defaultState();
  let currentTab = "home";
  let applyMiniAvatarCover = null;
  let applyNpCover = null;

  /* ---------------- storage ---------------- */
  function loadLocal(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      return mergeDefaults(parsed);
    }catch(e){ return null; }
  }
  function mergeDefaults(parsed){
    const d = defaultState();
    const profile = Object.assign({}, d.profile, parsed.profile, {
      avatarImage: Object.assign({}, d.profile.avatarImage, (parsed.profile && parsed.profile.avatarImage) || {})
    });
    const nowPlaying = Object.assign({}, d.nowPlaying, parsed.nowPlaying, {
      cover: Object.assign({}, d.nowPlaying.cover, (parsed.nowPlaying && parsed.nowPlaying.cover) || {})
    });
    const home = Object.assign({}, d.home, parsed.home, {
      cover: Object.assign({}, d.home.cover, (parsed.home && parsed.home.cover) || {})
    });
    const logCategories = (parsed.logCategories && parsed.logCategories.length) ? parsed.logCategories : d.logCategories;
    const log = (parsed.log || d.log).map(p => Object.assign({
      type: "LOG", category: (logCategories[0] && logCategories[0].id) || "general",
      images: [], secret: false, password: "", comments: [], bodyHtml: p.body || ""
    }, p));
    const memo = (parsed.memo || d.memo).map(m => Object.assign({ date: todayStr() }, m));
    const profileCards = (parsed.profileCards && parsed.profileCards.left && parsed.profileCards.right)
      ? parsed.profileCards : d.profileCards;
    return {
      meta: Object.assign({}, d.meta, parsed.meta, { tabNames: Object.assign({}, d.meta.tabNames, (parsed.meta && parsed.meta.tabNames) || {}) }),
      profile: profile,
      nowPlaying: nowPlaying,
      home: home,
      logCategories: logCategories,
      log: log,
      memo: memo,
      gallery: parsed.gallery || d.gallery,
      profileCards: profileCards
    };
  }
  function saveLocal(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function isAdmin(){ return sessionStorage.getItem(ADMIN_SESSION_KEY) === "1"; }
  function setAdmin(v){
    if(v) sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
    else sessionStorage.removeItem(ADMIN_SESSION_KEY);
    document.body.classList.toggle("admin-mode", v);
    document.getElementById("lockFab").textContent = v ? "🔓" : "🔒";
    document.getElementById("lockFab").classList.toggle("on", v);
  }

  /* ---------------- toast ---------------- */
  function showToast(msg, type){
    const c = document.getElementById("toastContainer");
    const t = document.createElement("div");
    t.className = "toast" + (type ? " " + type : "");
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => {
      t.style.transition = "opacity .25s";
      t.style.opacity = "0";
      setTimeout(() => t.remove(), 250);
    }, 2400);
  }

  /* ---------------- modal ---------------- */
  const overlay = document.getElementById("modalOverlay");
  const modalBox = document.getElementById("modalBox");
  function openModal(title, bodyHtml, opts){
    opts = opts || {};
    modalBox.className = "modal-box" + (opts.wide ? " wide" : "");
    modalBox.innerHTML =
      '<div class="modal-head"><span class="pixel">' + title + '</span><button class="modal-close" id="modalCloseBtn">✕</button></div>' +
      '<div class="modal-body">' + bodyHtml + '</div>';
    overlay.classList.add("open");
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  }
  function closeModal(){ overlay.classList.remove("open"); modalBox.innerHTML = ""; }
  overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });

  function requireAdmin(){
    if(!isAdmin()){
      showToast("권한이 없어요. 먼저 관리자로 로그인해주세요.", "error");
      openLoginModal();
      return false;
    }
    return true;
  }

  /* ---------------- login modal ---------------- */
  function openLoginModal(){
    openModal("ADMIN LOGIN",
      '<div class="field"><label>비밀번호</label>' +
      '<input type="password" id="loginPw" placeholder="••••" autocomplete="off" /></div>' +
      '<div class="modal-actions">' +
      '<button class="btn" id="loginCancel">취소</button>' +
      '<button class="btn primary" id="loginSubmit">로그인</button>' +
      '</div>'
    );
    const pwInput = document.getElementById("loginPw");
    pwInput.focus();
    const submit = () => {
      if(pwInput.value === state.meta.adminPassword){
        setAdmin(true);
        closeModal();
        showToast("관리자로 로그인되었습니다.", "success");
        render();
      }else{
        showToast("비밀번호가 올바르지 않습니다.", "error");
      }
    };
    document.getElementById("loginSubmit").addEventListener("click", submit);
    pwInput.addEventListener("keydown", (e) => { if(e.key === "Enter") submit(); });
    document.getElementById("loginCancel").addEventListener("click", closeModal);
  }

  function logout(){
    setAdmin(false);
    showToast("로그아웃되었습니다.", "success");
    render();
  }

  /* ---------------- settings modal ---------------- */
  function openSettingsModal(){
    if(!requireAdmin()) return;
    const m = state.meta;
    openModal("SETTINGS",
      '<div class="sub-head">사이트 정보</div>' +
      '<div class="field"><label>사이트 제목</label><input type="text" id="setTitle" value="' + esc(m.title) + '" /></div>' +
      '<div class="field"><label>사이트 설명</label><textarea id="setDesc">' + esc(m.description) + '</textarea></div>' +
      '<div class="field-row">' +
        '<div class="field"><label>D-day 기준일</label><input type="date" id="setDday" value="' + esc(m.ddayDate) + '" /></div>' +
        '<div class="field"><label>D-day 라벨</label><input type="text" id="setDdayLabel" value="' + esc(m.ddayLabel) + '" /></div>' +
      '</div>' +
      '<hr class="divider" />' +
      '<div class="sub-head">배경 이미지</div>' +
      '<div class="field"><label>바깥 배경 이미지 URL</label><input type="url" id="setBgUrl" placeholder="https://i.imgur.com/xxxx.jpg" value="' + esc(m.bgImageUrl) + '" /></div>' +
      '<div class="field"><label id="blurLabel">블러 정도 (' + m.bgBlur + 'px)</label><input type="range" id="setBgBlur" min="0" max="20" value="' + m.bgBlur + '" /></div>' +
      '<hr class="divider" />' +
      '<div class="sub-head">관리자 비밀번호 변경</div>' +
      '<div class="field-row">' +
        '<div class="field"><label>새 비밀번호</label><input type="password" id="setPw1" placeholder="변경 시에만 입력" /></div>' +
        '<div class="field"><label>새 비밀번호 확인</label><input type="password" id="setPw2" placeholder="변경 시에만 입력" /></div>' +
      '</div>' +
      '<hr class="divider" />' +
      '<div class="sub-head">GitHub Gist 연동</div>' +
      '<div class="field"><label>Personal Access Token (이 브라우저에만 저장됨)</label><input type="password" id="setGistToken" placeholder="ghp_xxxxxxxx" value="' + esc(localStorage.getItem(GIST_TOKEN_KEY) || "") + '" /></div>' +
      '<div class="field"><label>Gist ID</label><input type="text" id="setGistId" placeholder="예: 1234567890abcdef" value="' + esc(m.publicGistId) + '" />' +
      '<small>이 Gist ID가 대표(공개) Gist로 설정되어, 방문자가 접속할 때 자동으로 최신 데이터를 불러옵니다. 실제로 모든 방문자에게 적용하려면 코드 상단 CONFIG.PUBLIC_GIST_ID 값도 동일하게 넣고 재배포해주세요.</small></div>' +
      '<div class="gist-actions">' +
        '<button class="btn" id="gistPush">⬆ Gist에 백업(저장)</button>' +
        '<button class="btn" id="gistPull">⬇ Gist에서 불러오기</button>' +
      '</div>' +
      '<div class="modal-actions">' +
      '<button class="btn" id="setCancel">취소</button>' +
      '<button class="btn primary" id="setSave">저장</button>' +
      '</div>'
    );

    const blurInput = document.getElementById("setBgBlur");
    blurInput.addEventListener("input", () => {
      document.getElementById("blurLabel").textContent = "블러 정도 (" + blurInput.value + "px)";
    });

    document.getElementById("setCancel").addEventListener("click", closeModal);
    document.getElementById("setSave").addEventListener("click", () => {
      const pw1 = document.getElementById("setPw1").value;
      const pw2 = document.getElementById("setPw2").value;
      if(pw1 || pw2){
        if(pw1 !== pw2){ showToast("새 비밀번호가 일치하지 않습니다.", "error"); return; }
        if(pw1.length < 1){ showToast("비밀번호를 입력해주세요.", "error"); return; }
        state.meta.adminPassword = pw1;
      }
      state.meta.title = document.getElementById("setTitle").value.trim() || state.meta.title;
      state.meta.description = document.getElementById("setDesc").value;
      state.meta.ddayDate = document.getElementById("setDday").value || state.meta.ddayDate;
      state.meta.ddayLabel = document.getElementById("setDdayLabel").value.trim() || state.meta.ddayLabel;
      state.meta.bgImageUrl = document.getElementById("setBgUrl").value.trim();
      state.meta.bgBlur = Number(document.getElementById("setBgBlur").value);
      state.meta.publicGistId = document.getElementById("setGistId").value.trim();

      const token = document.getElementById("setGistToken").value;
      if(token) localStorage.setItem(GIST_TOKEN_KEY, token);
      else localStorage.removeItem(GIST_TOKEN_KEY);

      saveLocal();
      applyMeta();
      closeModal();
      showToast("설정이 저장되었습니다.", "success");
    });

    document.getElementById("gistPush").addEventListener("click", pushToGist);
    document.getElementById("gistPull").addEventListener("click", pullFromGist);
  }

  /* ---------------- gist sync ---------------- */
  async function pushToGist(){
    const gistId = document.getElementById("setGistId") ? document.getElementById("setGistId").value.trim() : state.meta.publicGistId;
    const token = document.getElementById("setGistToken") ? document.getElementById("setGistToken").value.trim() : localStorage.getItem(GIST_TOKEN_KEY);
    if(!gistId || !token){ showToast("Gist ID와 Personal Access Token을 모두 입력해주세요.", "error"); return; }
    try{
      showToast("Gist에 백업하는 중...", "warn");
      const res = await fetch("https://api.github.com/gists/" + gistId, {
        method: "PATCH",
        headers: {
          "Authorization": "token " + token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(state, null, 2) } } })
      });
      if(!res.ok) throw new Error("HTTP " + res.status);
      showToast("Gist 백업이 완료되었습니다.", "success");
    }catch(err){
      showToast("Gist 백업 실패: " + err.message, "error");
    }
  }

  async function pullFromGist(silent){
    const gistId = (document.getElementById("setGistId") && document.getElementById("setGistId").value.trim()) || state.meta.publicGistId;
    if(!gistId){ if(!silent) showToast("Gist ID를 입력해주세요.", "error"); return false; }
    try{
      if(!silent) showToast("Gist에서 불러오는 중...", "warn");
      const res = await fetch("https://api.github.com/gists/" + gistId);
      if(!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const file = data.files && data.files[GIST_FILENAME];
      if(!file) throw new Error("파일을 찾을 수 없습니다");
      const parsed = JSON.parse(file.content);
      state = mergeDefaults(parsed);
      saveLocal();
      applyMeta();
      renderAll();
      if(!silent) { closeModal(); showToast("Gist 데이터를 불러왔습니다.", "success"); }
      return true;
    }catch(err){
      if(!silent) showToast("불러오기 실패: " + err.message, "error");
      return false;
    }
  }

        wrap.innerHTML = '<div class="empty-msg">카테고리가 없어요.</div>';
        return;
      }
      state.logCategories.forEach((c, idx) => {
        const row = document.createElement("div");

        row.innerHTML =
          '<span class="cat-manage-name">' + esc(c.name) + '</span>' +
          '<div class="cat-manage-actions">' +

            '<button class="mini-btn danger" data-act="del">✕</button>' +
          '</div>';
        row.querySelector('[data-act="up"]').addEventListener("click", () => {
          if(idx === 0) return;
          const tmp = state.logCategories[idx - 1];
          state.logCategories[idx - 1] = state.logCategories[idx];
          state.logCategories[idx] = tmp;
          saveLocal(); renderCatList();
        });
        row.querySelector('[data-act="down"]').addEventListener("click", () => {
          if(idx === state.logCategories.length - 1) return;
          const tmp = state.logCategories[idx + 1];
          state.logCategories[idx + 1] = state.logCategories[idx];
          state.logCategories[idx] = tmp;
          saveLocal(); renderCatList();
        });
        row.querySelector('[data-act="del"]').addEventListener("click", () => {
          if(!confirm('"' + c.name + '" 카테고리를 삭제할까요? (해당 글은 미분류로 남아요)')) return;
          state.logCategories.splice(idx, 1);

      closeModal();
      renderLogCatTabs();
      renderLogList();
    });
  }

  /* ---------------- LOG post detail / comments / share ---------------- */
  function categoryName(id){
    const c = state.logCategories.find(x => x.id === id);
    return c ? c.name : "미분류";
  }
  function stripHtml(html){
    return String(html || "").replace(/<[^>]*>/g, " ");
  }
  function buildPostShareUrl(id){
    return location.origin + location.pathname + "?post=" + encodeURIComponent(id);
  }
  async function sharePost(id){
    const url = buildPostShareUrl(id);
    const post = state.log.find(p => p.id === id);
    if(navigator.share){
      try{ await navigator.share({ title: post ? post.title : document.title, url: url }); }
      catch(e){ /* 사용자가 취소한 경우는 무시 */ }
      return;
    }
    try{
      await navigator.clipboard.writeText(url);
      showToast("링크가 복사되었습니다.", "success");
    }catch(e){
      window.prompt("아래 링크를 복사하세요:", url);
    }
  }

  /* ---------------- helpers ---------------- */
  function esc(str){
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function todayStr(){
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function fmtDate(str){
    if(!str) return "";
    return str.replaceAll("-", ".");
  }

  /* ---------------- cover image editor (avatar / now playing / home) ---------------- */
  let activeDrag = null;
  window.addEventListener("mousemove", (e) => {
    if(!activeDrag) return;
    const dx = e.clientX - activeDrag.startX, dy = e.clientY - activeDrag.startY;
    if(Math.abs(dx) > 3 || Math.abs(dy) > 3) activeDrag.moved = true;
    if(!activeDrag.moved) return;
    const d = activeDrag.getData();
    if(d && d.url){
      const rect = activeDrag.containerEl.getBoundingClientRect();
      d.posX = Math.min(100, Math.max(0, activeDrag.startPosX - (dx / rect.width) * 100 / d.zoom));
      d.posY = Math.min(100, Math.max(0, activeDrag.startPosY - (dy / rect.height) * 100 / d.zoom));
      activeDrag.setData(d); activeDrag.apply();
    }
  });
  window.addEventListener("mouseup", () => {
    if(!activeDrag) return;
    const drag = activeDrag; activeDrag = null;
    if(!drag.moved){
      if(isAdmin()) openCoverUrlModal(drag.getData, drag.setData, drag.apply);
    }else{
      saveLocal();
    }
  });

  /* ---------------- generic drag-resize engine (info table label width) ---------------- */
  let activeResize = null;
  window.addEventListener("mousemove", (e) => {
    if(!activeResize) return;
    activeResize.onMove(e.clientX - activeResize.startX);
  });
  window.addEventListener("mouseup", () => {
    if(!activeResize) return;
    const r = activeResize; activeResize = null;
    if(r.onEnd) r.onEnd();
  });

  function makeCoverEditor(containerEl, imgEl, placeholderEl, getData, setData){
    function apply(){
      const d = getData();
      if(d && d.url){
        imgEl.src = d.url;
        imgEl.style.display = "block";
        imgEl.style.objectPosition = d.posX + "% " + d.posY + "%";
        imgEl.style.transform = "scale(" + d.zoom + ")";
        if(placeholderEl) placeholderEl.style.display = "none";
      }else{
        imgEl.style.display = "none";
        if(placeholderEl) placeholderEl.style.display = "flex";
      }
    }

    containerEl.addEventListener("wheel", (e) => {
      if(!isAdmin()) return;
      const d = getData();
      if(!d || !d.url) return;
      e.preventDefault();
      d.zoom = Math.min(4, Math.max(1, +(d.zoom + (e.deltaY < 0 ? 0.1 : -0.1)).toFixed(2)));
      setData(d); apply();
    }, { passive: false });

    containerEl.addEventListener("mousedown", (e) => {
      if(!isAdmin()) return;
      const d = getData();
      activeDrag = {
        containerEl: containerEl, getData: getData, setData: setData, apply: apply,
        moved: false, startX: e.clientX, startY: e.clientY,
        startPosX: d ? d.posX : 50, startPosY: d ? d.posY : 50
      };
      e.preventDefault();
    });

    apply();
    return apply;
  }

  function openCoverUrlModal(getData, setData, apply){
    const d = getData() || { url: "", zoom: 1, posX: 50, posY: 50 };
    openModal("이미지 URL 설정",
      '<div class="field"><label>이미지 URL</label><input type="url" id="fCoverUrl" placeholder="https://i.imgur.com/xxxx.jpg" value="' + esc(d.url) + '" /></div>' +
      '<small style="display:block;margin:-6px 0 14px;color:var(--ink-soft);">저장 후 이미지 위에서 휠로 확대·축소, 드래그로 위치를 옮길 수 있어요.</small>' +
      '<div class="modal-actions">' +
        (d.url ? '<button class="btn danger" id="fRemove">이미지 제거</button>' : '') +
        '<button class="btn" id="fCancel">취소</button>' +
        '<button class="btn primary" id="fSave">저장</button>' +
      '</div>'
    );
    document.getElementById("fCancel").addEventListener("click", closeModal);
    const removeBtn = document.getElementById("fRemove");
    if(removeBtn){
      removeBtn.addEventListener("click", () => {
        setData({ url: "", zoom: 1, posX: 50, posY: 50 });
        apply(); saveLocal(); closeModal();
        showToast("이미지가 제거되었습니다.", "success");
      });
    }
    document.getElementById("fSave").addEventListener("click", () => {
      const url = document.getElementById("fCoverUrl").value.trim();
      const next = Object.assign({}, d, { url: url });
      if(url && !d.url){ next.zoom = 1; next.posX = 50; next.posY = 50; }
      setData(next);
      apply(); saveLocal(); closeModal();
      showToast("이미지가 저장되었습니다.", "success");
    });
  }

    head.innerHTML =
      '<span class="section-label">' + esc(profileSectionLabel(sec)) + '</span>' +
      '<span class="section-reorder admin-only">' +
        '<button class="mini-btn" data-act="up">▲</button>' +
        '<button class="mini-btn" data-act="down">▼</button>' +
      '</span>';
    head.querySelector('[data-act="up"]').addEventListener("click", () => {
      if(idx === 0) return;
      const arr = card.sections;
      const tmp = arr[idx - 1]; arr[idx - 1] = arr[idx]; arr[idx] = tmp;
      saveLocal(); renderProfileCard(side);
    });
    head.querySelector('[data-act="down"]').addEventListener("click", () => {
      const arr = card.sections;
      if(idx === arr.length - 1) return;
      const tmp = arr[idx + 1]; arr[idx + 1] = arr[idx]; arr[idx] = tmp;
      saveLocal(); renderProfileCard(side);
    });
    block.appendChild(head);

    const content = document.createElement("div");
    content.className = "section-content";
    block.appendChild(content);

    if(sec.type === "photo") buildProfilePhotoSection(content, sec);
    else if(sec.type === "quote") buildProfileQuoteSection(content, sec);
    else if(sec.type === "info") buildProfileInfoSection(content, sec, side);
    else if(sec.type === "text") buildProfileTextSection(content, sec);
    else if(sec.type === "tags") buildProfileTagsSection(content, sec, side);

    return block;
  }

  function buildProfilePhotoSection(content, sec){
    const box = document.createElement("div");
    box.className = "profile-photo-box cover-edit";
    box.innerHTML =
      '<span class="cover-placeholder">🖼</span>' +
      '<img class="cover-img" alt="" />' +
      '<div class="cover-hint admin-only">🖱 휠 확대·축소 / 드래그 이동 / 클릭 이미지 변경</div>';
    content.appendChild(box);
    makeCoverEditor(
      box, box.querySelector(".cover-img"), box.querySelector(".cover-placeholder"),
      () => sec.data, (d) => { sec.data = d; }
    );
  }

  function buildProfileQuoteSection(content, sec){
    const q = document.createElement("div");
    q.className = "quote-block";
    q.textContent = sec.data.text || "이곳에 명대사를 적어보세요.";
    content.appendChild(q);
    const hint = document.createElement("div");
    hint.className = "edit-hint admin-only";
    hint.textContent = "✎ 더블클릭하여 수정";
    content.appendChild(hint);
    setupInlineTextEdit(q, (val) => { sec.data.text = val; saveLocal(); });
  }

  function buildProfileTextSection(content, sec){
    const t = document.createElement("div");
    t.className = "text-block";
    t.textContent = sec.data.text || "";
    content.appendChild(t);
    const hint = document.createElement("div");
    hint.className = "edit-hint admin-only";
    hint.textContent = "✎ 더블클릭하여 수정";
    content.appendChild(hint);
    setupInlineTextEdit(t, (val) => { sec.data.text = val; saveLocal(); });
  }

  function buildProfileInfoSection(content, sec, side){
    const wrap = document.createElement("div");
    wrap.className = "info-table";
    wrap.style.setProperty("--label-w", (sec.data.labelWidth || 76) + "px");

    sec.data.rows.forEach((row, rIdx) => {
      const rEl = document.createElement("div");
      rEl.className = "info-row";

      const labelEl = document.createElement("div");
      labelEl.className = "info-label";
      labelEl.textContent = row.label;
      labelEl.contentEditable = isAdmin() ? "true" : "false";
      labelEl.addEventListener("blur", () => { row.label = labelEl.textContent.trim(); saveLocal(); });

      const handle = document.createElement("div");
      handle.className = "info-resizer-handle admin-only";
      handle.addEventListener("mousedown", (e) => {
        if(!isAdmin()) return;
        e.preventDefault();
        const startWidth = parseInt(wrap.style.getPropertyValue("--label-w")) || 76;
        activeResize = {
          startX: e.clientX,
          onMove: (dx) => {
            const w = Math.max(50, Math.min(220, startWidth + dx));
            wrap.style.setProperty("--label-w", w + "px");
          },
          onEnd: () => {
            sec.data.labelWidth = parseInt(wrap.style.getPropertyValue("--label-w"));
            saveLocal();
          }
        };
      });

      const valueEl = document.createElement("div");
      valueEl.className = "info-value";
      valueEl.textContent = row.value;
      valueEl.contentEditable = isAdmin() ? "true" : "false";
      valueEl.addEventListener("blur", () => { row.value = valueEl.textContent.trim(); saveLocal(); });

      const delBtn = document.createElement("button");
      delBtn.className = "mini-btn danger admin-only inline info-row-del";
      delBtn.textContent = "✕";
      delBtn.addEventListener("click", () => {
        sec.data.rows.splice(rIdx, 1);
        saveLocal();
        renderProfileCard(side);
      });

      rEl.appendChild(labelEl); rEl.appendChild(handle); rEl.appendChild(valueEl); rEl.appendChild(delBtn);
      wrap.appendChild(rEl);
    });
    content.appendChild(wrap);

    const addRowBtn = document.createElement("button");
    addRowBtn.className = "mini-btn admin-only";
    addRowBtn.style.marginTop = "8px";
    addRowBtn.textContent = "+ 행 추가";
    addRowBtn.addEventListener("click", () => {
      sec.data.rows.push({ label: "새 항목", value: "" });
      saveLocal();
      renderProfileCard(side);
    });
    content.appendChild(addRowBtn);
  }

  function buildProfileTagsSection(content, sec, side){
    sec.data.tags = sec.data.tags || [];
    const wrap = document.createElement("div");
    wrap.className = "tags-wrap";
    sec.data.tags.forEach((tag, tIdx) => {
      const chip = document.createElement("span");
      chip.className = "tag-chip";
      chip.innerHTML = esc(tag) + ' <button type="button" class="tag-remove admin-only inline" data-idx="' + tIdx + '">✕</button>';
      const rmBtn = chip.querySelector(".tag-remove");
      if(rmBtn){
        rmBtn.addEventListener("click", () => {
          sec.data.tags.splice(tIdx, 1);
          saveLocal();
          renderProfileCard(side);
        });
      }
      wrap.appendChild(chip);
    });
    if(sec.data.tags.length === 0){
      const empty = document.createElement("span");
      empty.className = "empty-msg";
      empty.style.padding = "0";
      empty.textContent = "아직 없어요.";
      wrap.appendChild(empty);
    }
    content.appendChild(wrap);

    const addRow = document.createElement("div");
    addRow.className = "tag-add-row admin-only";
    addRow.innerHTML = '<input type="text" class="tag-add-input" placeholder="추가할 태그" /><button type="button" class="mini-btn">추가</button>';
    content.appendChild(addRow);
    const input = addRow.querySelector("input");
    const addTag = () => {
      const val = input.value.trim();
      if(!val) return;
      sec.data.tags.push(val);
      saveLocal();
      renderProfileCard(side);
    };
    addRow.querySelector("button").addEventListener("click", addTag);
    input.addEventListener("keydown", (e) => { if(e.key === "Enter"){ e.preventDefault(); addTag(); } });
  }

  /* ---------------- calendar ---------------- */
  function renderCalendar(){
    const now = new Date();
    const year = now.getFullYear(), month = now.getMonth();
    const first = new Date(year, month, 1);
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const startDay = first.getDay();
    const table = document.getElementById("calTable");
    table.innerHTML = "";
    const dowRow = document.createElement("tr");
    ["일","월","화","수","목","금","토"].forEach(d => {
      const th = document.createElement("th"); th.textContent = d; dowRow.appendChild(th);
    });
    table.appendChild(dowRow);
    let row = document.createElement("tr");
    for(let i = 0; i < startDay; i++) row.appendChild(document.createElement("td"));
    for(let day = 1; day <= daysInMonth; day++){
      const td = document.createElement("td");
      td.textContent = day;
      if(day === now.getDate()) td.classList.add("today");
      row.appendChild(td);
      if((startDay + day) % 7 === 0){ table.appendChild(row); row = document.createElement("tr"); }
    }
    if(row.children.length) table.appendChild(row);
  }

  /* ---------------- clock ---------------- */
  function tickClock(){
    const d = new Date();
    document.getElementById("clock").textContent = String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }

  /* ---------------- render all ---------------- */
  function renderAll(){
    applyMeta();
    renderProfileMini();
    renderNowPlaying();
    renderNav();
    renderPanel();
    renderCalendar();
  }
  function render(){ renderAll(); }

  /* ---------------- init ---------------- */
  document.getElementById("lockFab").addEventListener("click", () => {
    if(isAdmin()){
      if(confirm("로그아웃 하시겠어요?")) logout();
    }else{
      openLoginModal();
    }
  });
  document.getElementById("settingsFab").addEventListener("click", openSettingsModal);
  document.getElementById("editNowPlaying").addEventListener("click", openNowPlayingEditor);
  document.getElementById("editMiniProfile").addEventListener("click", openProfileEditor);

  applyMiniAvatarCover = makeCoverEditor(
    document.getElementById("miniAvatarBox"),
    document.getElementById("miniAvatarImg"),
    document.getElementById("miniAvatarPlaceholder"),
    () => state.profile.avatarImage,
    (d) => { state.profile.avatarImage = d; }
  );
  applyNpCover = makeCoverEditor(
    document.getElementById("npCoverBox"),
    document.getElementById("npCoverImg"),
    document.getElementById("npCoverPlaceholder"),
    () => state.nowPlaying.cover,
    (d) => { state.nowPlaying.cover = d; }
  );

  /* ---------------- content protection: no right-click / no drag-save for non-admin ---------------- */
  document.addEventListener("contextmenu", (e) => {
    if(!isAdmin()) e.preventDefault();
  });
  document.addEventListener("dragstart", (e) => {
    if(!isAdmin() && e.target && e.target.tagName === "IMG") e.preventDefault();
  });

  setAdmin(isAdmin());
  tickClock();
  setInterval(tickClock, 30000);

  (async function boot(){
    // 일반 방문자는 대표 Gist가 지정되어 있으면 최신 데이터를 자동으로 불러옵니다.
    if(!isAdmin() && state.meta.publicGistId){
      const ok = await pullFromGist(true);
      if(!ok) renderAll();
    }else{
      renderAll();
    }

    // ?post=id 로 접속하면 LOG 탭으로 이동 후 해당 글의 상세 모달을 자동으로 엽니다.
    const postId = new URLSearchParams(location.search).get("post");
    if(postId){
      currentTab = "log";
      renderNav();
      renderPanel();
      openPostDetail(postId);
    }
  })();

})();
</script>
</body>
</html>
